services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kreativibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kreativibe}
      POSTGRES_DB: ${POSTGRES_DB:-kreativibe}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kreativibe}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kreativibe}:${POSTGRES_PASSWORD:-kreativibe}@db:5432/${POSTGRES_DB:-kreativibe}
      PORT: ${PORT:-3050}
    ports:
      - '${PORT:-3050}:3050'
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
