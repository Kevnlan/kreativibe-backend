services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: kreativibe-api

    restart: unless-stopped

    env_file:
      - .env

    environment:
      PORT: ${PORT:-3050}

    ports:
      - "${PORT:-3050}:3050"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    driver: bridge